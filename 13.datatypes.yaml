#to learn datatypes in ansible

- name: datatypes in ansible
  hosts: local
  connection: local
  vars:
   course: "DevOps with AWS" #string"
   duration: "4 months"  #string"
   days: 5             #integer
   is_live: true       #boolean
   topics: #list [ ]
   - linux
   - shell
   - ansible
   - terraform
   - jenkins
   - kubernetes
   - git
   structure: #map/dictionary { }
    linux: "4 weeks"
    shell: "3 weeks"
    ansibel: "just started"
    remains topucs: "yet to start"
  tasks:
  - name: datatypes in ansible
    ansible.builtin.debug:
     msg: | #giving pipe symbol for printing multiple lines
      program is: {{ course }} \n
      duration of course is: {{ duration }} \n
      days in a weeks is: {{ days }} \n
      live covered is: {{ is_live }} \n
      topics of course are: {{ topics }} \n
      schedule of topics are: {{ structure }} 

