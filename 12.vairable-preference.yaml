#to understand vairable preference/precedence

- name: vairable preference at play level
  hosts: local
  connection: local
  vars: #vairable giving at play level 
   username: "play level user ansible"

  vars_files: #vairable giving from another file 
   - 07.vairables.yaml
  

  vars_prompt: #vairable giving from prompt
   - name: username
     prompt: "please enter vairable from prompt"
     private: false
  
  tasks: #vairable giving at arguments 
  - name : print vairable at runtime
    vars: 
      username: "Ansible vairable from arguments"
    ansible.builtin.debug:
       msg: "ansible vairable at {{ username }}"
  
  tasks: #vairable giving at task level
  - name: print vairable at task level
    vars:
      username: "ansible vairable from task level"
    ansible.builtin.debug:
      msg: "{{ username }}"


  
#first priority is from arguments
#second priority is from task level
#third priority is from file
#fourth priority is from prompt
#fifth priority is from play level
#sixth priority is from inventory file 

