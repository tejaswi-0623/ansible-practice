#to learn vairables

- name: task level vairables
  hosts: local
  connection: local
  vars:
   COURSE: "DevOps with AWS"
   DURATION: "4 months"
   DAYS: "5 days"
  tasks:
   - name: print vairables at task level
     vars:
      COURSE: "ansible"
     ansible.builtin.debug:
      msg: "course is: {{ COURSE }}, duration of course is: {{ DURATION }}, days covered in week is: {{ DAYS }}"


#in prompt: ansible-playbook -i inventory.ini task-vairables.yaml
#"msg": "course is: ansible, duration of course is: 4 months, days covered in week is: 5 days"
#here at task level course vairable overrides the play level 